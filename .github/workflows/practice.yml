
name: practice

on:
  push:


jobs:
  validation:
    runs-on: ubuntu-latest
    env:
      MLFLOW_TRACKING_URI: ${{secrets.MLFLOW_TRACKING_URI}}

    steps: 
      - name: checkout repo
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
         python-version: '3.10'
      
      - name: install dependeces 
        run: pip install -r requirements.txt

      - name: pull dvc
        run: dvc pull

      - name: train model
        run: python training.py

      - name: saved model info
        run: echo "Run_ID_123" > model_info.txt
      
      - name: upload artifact
        uses: actions/upload-artifact@v4
        with: 
         name: model-info
         path: model_info.txt
  
  deployment:
    needs: validation
    runs-on: ubuntu-latest

    steps:
      - name: check out
        uses: actions/checkout@v4

      - name: download artifact
        uses: actions/download-artifact@v4
        with: 
         name: model-info
      
      - name: accuracy threshold
        run: python check_model_accuracy_threshold.py
      
      - name: docker build simulation
        run: echo "docker build image simulation"

      

